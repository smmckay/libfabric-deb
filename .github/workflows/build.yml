name: Build libfabric .deb

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream tag to build (e.g. v1.22.0). Leave blank to build any new tags.'
        required: false
        default: ''
      force:
        description: 'Rebuild even if a release already exists.'
        type: boolean
        default: false
      target:
        description: 'Limit build to one target (e.g. jammy-arm64). Empty = all four.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: libfabric-deb
  cancel-in-progress: false

jobs:
  find-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.find.outputs.tags }}
      include: ${{ steps.find.outputs.include }}
    steps:
      - name: Find tags to build
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TARGET: ${{ inputs.target }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          # All possible (codename, arch) combinations and their runner labels.
          all_targets='[
            {"codename":"jammy","arch":"amd64","os":"ubuntu-22.04"},
            {"codename":"jammy","arch":"arm64","os":"ubuntu-22.04-arm"},
            {"codename":"noble","arch":"amd64","os":"ubuntu-24.04"},
            {"codename":"noble","arch":"arm64","os":"ubuntu-24.04-arm"}
          ]'

          # If --target=<codename>-<arch> was passed, narrow to that one entry.
          if [ -n "${INPUT_TARGET}" ]; then
            cn="${INPUT_TARGET%-*}"
            ar="${INPUT_TARGET##*-}"
            all_targets=$(echo "$all_targets" \
              | jq -c --arg cn "$cn" --arg ar "$ar" \
                  'map(select(.codename==$cn and .arch==$ar))')
            if [ "$(echo "$all_targets" | jq 'length')" -eq 0 ]; then
              echo "::error::unknown target ${INPUT_TARGET}"
              exit 1
            fi
          fi

          # Manual tag override skips both apt-version and existing-release checks.
          if [ -n "${INPUT_TAG}" ]; then
            include=$(echo "$all_targets" | jq -c --arg tag "$INPUT_TAG" \
              'map({tag:$tag, codename, arch, os})')
            echo "include=$include" >> "$GITHUB_OUTPUT"
            echo "tags=$(jq -nc --arg t "$INPUT_TAG" '[$t]')" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # All upstream stable tags, sorted oldest-first.
          upstream=$(git ls-remote --tags --refs https://github.com/ofiwg/libfabric.git \
            | awk '{print $2}' | sed 's|refs/tags/||' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V)

          if [ "$FORCE" = "true" ]; then
            existing=""
          else
            existing=$(gh release list -R "$REPO" --limit 1000 --json tagName -q '.[].tagName' || true)
          fi

          # Tags not yet released, oldest first.
          unreleased=$(comm -23 <(echo "$upstream" | sort -u) <(echo "$existing" | sort -u) | sort -V)

          if [ -z "$unreleased" ]; then
            echo "No unreleased upstream tags."
            echo "include=[]" >> "$GITHUB_OUTPUT"
            echo "tags=[]"   >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Look up the latest libfabric source-package version per codename via madison.
          # Empty string = package absent in that codename; treat as "all newer".
          declare -A apt_version
          for codename in $(echo "$all_targets" | jq -r 'map(.codename)|unique[]'); do
            line=$(curl -fsSL "https://qa.debian.org/madison.php?package=libfabric&table=ubuntu&s=${codename}&text=on" || true)
            v=$(echo "$line" | awk -F'|' 'NF>=2 {gsub(/^ +| +$/,"",$2); print $2}' | sort -V | tail -1)
            apt_version[$codename]="${v:-}"
            echo "apt[$codename]=${apt_version[$codename]:-<absent>}"
          done

          # Walk unreleased tags oldest-first; pick the FIRST tag with at least one
          # eligible codename. Build only its eligible (codename, arch) pairs. This
          # way every run produces a single release in semver order.
          selected=""
          include='[]'
          for tag in $unreleased; do
            upstream_v="${tag#v}"
            candidates='[]'
            while read -r entry; do
              codename=$(echo "$entry" | jq -r '.codename')
              arch=$(echo "$entry" | jq -r '.arch')
              os=$(echo "$entry" | jq -r '.os')
              apt_v="${apt_version[$codename]}"
              if [ -z "$apt_v" ] || dpkg --compare-versions "$upstream_v" gt "$apt_v"; then
                candidates=$(echo "$candidates" | jq -c \
                  --arg tag "$tag" --arg cn "$codename" --arg ar "$arch" --arg os "$os" \
                  '. + [{tag:$tag, codename:$cn, arch:$ar, os:$os}]')
              fi
            done < <(echo "$all_targets" | jq -c '.[]')

            if [ "$(echo "$candidates" | jq 'length')" -gt 0 ]; then
              selected="$tag"
              include="$candidates"
              break
            fi
            echo "skip ${tag} (apt versions newer in every codename)"
          done

          if [ -z "$selected" ]; then
            echo "No eligible unreleased tags."
            echo "include=[]" >> "$GITHUB_OUTPUT"
            echo "tags=[]"   >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tags=$(jq -nc --arg t "$selected" '[$t]')
          echo "include=$include" >> "$GITHUB_OUTPUT"
          echo "tags=$tags"       >> "$GITHUB_OUTPUT"
          echo
          echo "selected = $selected"
          echo "include  = $include"

  build:
    needs: find-tags
    if: needs.find-tags.outputs.tags != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.find-tags.outputs.include) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout this repo (for scripts/)
        if: env.ACT != 'true'
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper dh-autoreconf dpkg-dev fakeroot \
            autoconf automake libtool pkg-config \
            librdmacm-dev libibverbs-dev libnuma-dev ca-certificates

      - name: Checkout libfabric ${{ matrix.tag }}
        uses: actions/checkout@v6
        with:
          repository: ofiwg/libfabric
          ref: ${{ matrix.tag }}
          path: src

      - name: Stage debian/ packaging
        env:
          TAG: ${{ matrix.tag }}
          CODENAME: ${{ matrix.codename }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          deb_version="${version}-1~${CODENAME}1"
          cp -r debian src/debian
          cat > src/debian/changelog <<EOF
          libfabric (${deb_version}) ${CODENAME}; urgency=medium

            * Automated backport build of upstream ${TAG}.

           -- libfabric backport bot <noreply@github.com>  $(date -uR)
          EOF
          cat src/debian/changelog

      - name: Start resource sampler
        run: |
          mkdir -p /tmp/metrics
          ( while true; do
              date -u +%FT%TZ
              awk '/^MemTotal|^MemAvailable|^MemFree|^Cached|^SwapFree/' /proc/meminfo
              cat /sys/fs/cgroup/memory.current 2>/dev/null \
                | awk '{printf "cgroup.current=%d\n",$1}'
              ps -eo pid,rss,comm --sort=-rss | head -8
              echo '---'
              sleep 2
            done ) > /tmp/metrics/sampler.log 2>&1 &
          echo $! > /tmp/metrics/sampler.pid

      - name: Build .debs
        working-directory: src
        env:
          DEB_BUILD_OPTIONS: parallel=4
        run: |
          set -euo pipefail
          /usr/bin/time -v dpkg-buildpackage -b -us -uc 2>&1 \
            | tee /tmp/metrics/build.log
          ls -la ..

      - name: Collect post-mortem
        if: always()
        run: |
          set +e
          kill "$(cat /tmp/metrics/sampler.pid)" 2>/dev/null
          {
            echo '== memory.peak =='; cat /sys/fs/cgroup/memory.peak 2>/dev/null
            echo '== memory.max  =='; cat /sys/fs/cgroup/memory.max  2>/dev/null
            echo '== memory.events ==';  cat /sys/fs/cgroup/memory.events 2>/dev/null
            echo '== free -h =='; free -h
            echo '== dmesg (oom) =='; sudo dmesg -T | grep -iE 'oom|killed process' || echo 'no OOM in dmesg'
          } > /tmp/metrics/postmortem.txt
          cat /tmp/metrics/postmortem.txt

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.tag }}-${{ matrix.codename }}-${{ matrix.arch }}
          path: /tmp/metrics/
          if-no-files-found: warn

      - name: Verify .debs
        env:
          TAG: ${{ matrix.tag }}
          CODENAME: ${{ matrix.codename }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          deb_version="${version}-1~${CODENAME}1"
          python3 scripts/verify_deb.py \
            --runtime "libfabric_${deb_version}_${ARCH}.deb" \
            --dev     "libfabric-dev_${deb_version}_${ARCH}.deb" \
            --dbgsym  "libfabric-dbgsym_${deb_version}_${ARCH}.ddeb" \
            --tag     "$TAG" \
            --codename "$CODENAME" \
            --arch    "$ARCH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.tag }}-${{ matrix.codename }}-${{ matrix.arch }}
          path: |
            libfabric_*.deb
            libfabric-dev_*.deb
            libfabric-dbgsym_*.ddeb
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [find-tags, build]
    if: needs.find-tags.outputs.tags != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        tag: ${{ fromJson(needs.find-tags.outputs.tags) }}
    steps:
      - name: Download .debs for ${{ matrix.tag }}
        uses: actions/download-artifact@v4
        with:
          pattern: deb-${{ matrix.tag }}-*
          merge-multiple: true
          path: debs

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail
          ls -la debs/

          notes="Automated backport build of [libfabric ${TAG}](https://github.com/ofiwg/libfabric/releases/tag/${TAG}).

          Targets: Ubuntu 22.04 (jammy) and 24.04 (noble), amd64 and arm64.

          Install:
          \`\`\`
          curl -sSLO https://github.com/${REPO}/releases/download/${TAG}/libfabric_<version>_<arch>.deb
          sudo dpkg -i libfabric_*.deb
          \`\`\`"

          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" -R "$REPO" --clobber debs/*.deb debs/*.ddeb
          else
            gh release create "$TAG" -R "$REPO" \
              --title "libfabric ${TAG}" \
              --notes "$notes" \
              debs/*.deb debs/*.ddeb
          fi
