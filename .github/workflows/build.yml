name: Build libfabric .deb

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream tag to build (e.g. v1.22.0). Leave blank to build any new tags.'
        required: false
        default: ''
      force:
        description: 'Rebuild even if a release already exists.'
        type: boolean
        default: false
      target:
        description: 'Limit build to one target (e.g. jammy-arm64). Empty = all four.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: libfabric-deb
  cancel-in-progress: false

jobs:
  find-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.find.outputs.tags }}
      include: ${{ steps.find.outputs.include }}
    steps:
      - name: Find tags to build
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TARGET: ${{ inputs.target }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          # All possible (codename, arch) combinations and their runner labels.
          all_targets='[
            {"codename":"jammy","arch":"amd64","os":"ubuntu-22.04"},
            {"codename":"jammy","arch":"arm64","os":"ubuntu-22.04-arm"},
            {"codename":"noble","arch":"amd64","os":"ubuntu-24.04"},
            {"codename":"noble","arch":"arm64","os":"ubuntu-24.04-arm"}
          ]'

          # If --target=<codename>-<arch> was passed, narrow to that one entry.
          if [ -n "${INPUT_TARGET}" ]; then
            cn="${INPUT_TARGET%-*}"
            ar="${INPUT_TARGET##*-}"
            all_targets=$(echo "$all_targets" \
              | jq -c --arg cn "$cn" --arg ar "$ar" \
                  'map(select(.codename==$cn and .arch==$ar))')
            if [ "$(echo "$all_targets" | jq 'length')" -eq 0 ]; then
              echo "::error::unknown target ${INPUT_TARGET}"
              exit 1
            fi
          fi

          # Manual tag override skips both apt-version and existing-release checks.
          if [ -n "${INPUT_TAG}" ]; then
            include=$(echo "$all_targets" | jq -c --arg tag "$INPUT_TAG" \
              'map({tag:$tag, codename, arch, os})')
            echo "include=$include" >> "$GITHUB_OUTPUT"
            echo "tags=$(jq -nc --arg t "$INPUT_TAG" '[$t]')" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # All upstream stable tags, sorted; capped to 5 newest before per-codename
          # filtering so a brand-new clone doesn't fan out into 100s of builds.
          upstream=$(git ls-remote --tags --refs https://github.com/ofiwg/libfabric.git \
            | awk '{print $2}' | sed 's|refs/tags/||' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -5)

          if [ "$FORCE" = "true" ]; then
            existing=""
          else
            existing=$(gh release list -R "$REPO" --limit 1000 --json tagName -q '.[].tagName' || true)
          fi

          # Tags not yet released — still capped at 5.
          unreleased=$(comm -23 <(echo "$upstream" | sort -u) <(echo "$existing" | sort -u) | sort -V)

          if [ -z "$unreleased" ]; then
            echo "No unreleased upstream tags."
            echo "include=[]" >> "$GITHUB_OUTPUT"
            echo "tags=[]"   >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Look up the latest libfabric source-package version per codename via madison.
          # Empty string = package absent in that codename; treat as "all newer".
          declare -A apt_version
          for codename in $(echo "$all_targets" | jq -r 'map(.codename)|unique[]'); do
            line=$(curl -fsSL "https://qa.debian.org/madison.php?package=libfabric&table=ubuntu&s=${codename}&text=on" || true)
            v=$(echo "$line" | awk -F'|' 'NF>=2 {gsub(/^ +| +$/,"",$2); print $2}' | sort -V | tail -1)
            apt_version[$codename]="${v:-}"
            echo "apt[$codename]=${apt_version[$codename]:-<absent>}"
          done

          # For each (codename, arch, os) and each unreleased tag, keep iff upstream > apt.
          include='[]'
          tag_set=''
          while read -r entry; do
            codename=$(echo "$entry" | jq -r '.codename')
            arch=$(echo "$entry" | jq -r '.arch')
            os=$(echo "$entry" | jq -r '.os')
            apt_v="${apt_version[$codename]}"
            for tag in $unreleased; do
              upstream_v="${tag#v}"
              if [ -z "$apt_v" ] || dpkg --compare-versions "$upstream_v" gt "$apt_v"; then
                include=$(echo "$include" | jq -c \
                  --arg tag "$tag" --arg cn "$codename" --arg ar "$arch" --arg os "$os" \
                  '. + [{tag:$tag, codename:$cn, arch:$ar, os:$os}]')
                tag_set+="$tag"$'\n'
              else
                echo "skip ${codename}/${arch} ${tag} (apt has ${apt_v})"
              fi
            done
          done < <(echo "$all_targets" | jq -c '.[]')

          tags=$(echo "$tag_set" | sort -V | uniq | grep -v '^$' | jq -R . | jq -sc .)
          [ -z "$(echo "$tag_set" | grep -v '^$' || true)" ] && tags='[]'

          echo "include=$include" >> "$GITHUB_OUTPUT"
          echo "tags=$tags"       >> "$GITHUB_OUTPUT"
          echo
          echo "include = $include"
          echo "tags = $tags"

  build:
    needs: find-tags
    if: needs.find-tags.outputs.tags != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.find-tags.outputs.include) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout this repo (for scripts/)
        if: env.ACT != 'true'
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            librdmacm-dev libibverbs-dev libnuma-dev ca-certificates

      - name: Checkout libfabric ${{ matrix.tag }}
        uses: actions/checkout@v4
        with:
          repository: ofiwg/libfabric
          ref: ${{ matrix.tag }}
          path: src

      - name: Build
        working-directory: src
        run: |
          set -euo pipefail
          ./autogen.sh
          ./configure --prefix=/usr \
              --enable-shared \
              --enable-static \
              --with-cuda=no \
              --enable-efa=yes \
              --enable-verbs=yes
          make -j"$(nproc)"
          make install DESTDIR="$GITHUB_WORKSPACE/staging"

      - name: Package .debs
        env:
          TAG: ${{ matrix.tag }}
          CODENAME: ${{ matrix.codename }}
          ARCH: ${{ matrix.arch }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          deb_version="${version}-1~${CODENAME}1"

          # Clean any leftovers (matters when re-running locally via `act --bind`).
          rm -rf pkg-runtime pkg-dev

          # Strip libtool archives that bake in $GITHUB_WORKSPACE paths.
          find staging/usr/lib -name '*.la' -delete || true

          # Partition: move dev-only bits out of staging/ into pkg-dev/.
          # Whatever's left in staging/ is the runtime tree.
          mkdir -p pkg-dev/usr/lib pkg-dev/usr/share/man

          if [ -d staging/usr/include ]; then
            mv staging/usr/include pkg-dev/usr/
          fi
          if [ -L staging/usr/lib/libfabric.so ] || [ -e staging/usr/lib/libfabric.so ]; then
            mv staging/usr/lib/libfabric.so pkg-dev/usr/lib/
          fi
          if [ -d staging/usr/lib/pkgconfig ]; then
            mv staging/usr/lib/pkgconfig pkg-dev/usr/lib/
          fi
          find staging/usr/lib -maxdepth 1 -name '*.a' -exec mv {} pkg-dev/usr/lib/ \;
          if [ -d staging/usr/share/man/man3 ]; then
            mv staging/usr/share/man/man3 pkg-dev/usr/share/man/
          fi

          # Drop empty placeholder dirs in pkg-dev so dpkg-deb doesn't include junk.
          find pkg-dev -type d -empty -delete
          mkdir -p pkg-dev/DEBIAN

          # staging/ is now the runtime tree.
          mv staging pkg-runtime
          mkdir -p pkg-runtime/DEBIAN

          cat > pkg-runtime/DEBIAN/control <<EOF
          Package: libfabric
          Version: ${deb_version}
          Section: libs
          Priority: optional
          Architecture: ${ARCH}
          Depends: librdmacm1, libibverbs1, libnuma1
          Provides: libfabric1, libfabric-bin
          Replaces: libfabric1, libfabric-bin
          Conflicts: libfabric1, libfabric-bin
          Maintainer: ${REPO} <noreply@github.com>
          Homepage: https://github.com/ofiwg/libfabric
          Description: User-space RDMA fabric library (backport ${TAG})
           Backport of upstream libfabric ${TAG} for Ubuntu ${CODENAME}.
           Provides the runtime shared library, provider plugins, and
           CLI utilities (fi_info, fi_pingpong, etc.).
          EOF

          cat > pkg-dev/DEBIAN/control <<EOF
          Package: libfabric-dev
          Version: ${deb_version}
          Section: libdevel
          Priority: optional
          Architecture: ${ARCH}
          Depends: libfabric (= ${deb_version})
          Provides: libfabric-dev
          Replaces: libfabric-dev
          Conflicts: libfabric-dev
          Maintainer: ${REPO} <noreply@github.com>
          Homepage: https://github.com/ofiwg/libfabric
          Description: User-space RDMA fabric library (backport ${TAG}) - development files
           Headers, pkg-config file, and unversioned shared-library
           symlink for building software against libfabric ${TAG} on
           Ubuntu ${CODENAME}.
          EOF

          echo "=== pkg-runtime contents ==="
          find pkg-runtime \( -type f -o -type l \) | sort
          echo "=== pkg-dev contents ==="
          find pkg-dev \( -type f -o -type l \) | sort

          rt_deb="libfabric_${deb_version}_${ARCH}.deb"
          dev_deb="libfabric-dev_${deb_version}_${ARCH}.deb"
          dpkg-deb --build --root-owner-group pkg-runtime "$rt_deb"
          dpkg-deb --build --root-owner-group pkg-dev     "$dev_deb"
          dpkg-deb --info "$rt_deb"
          dpkg-deb --info "$dev_deb"
          echo "RT_DEB=$rt_deb"   >> "$GITHUB_ENV"
          echo "DEV_DEB=$dev_deb" >> "$GITHUB_ENV"

      - name: Verify .debs
        env:
          TAG: ${{ matrix.tag }}
          CODENAME: ${{ matrix.codename }}
          ARCH: ${{ matrix.arch }}
        run: |
          python3 scripts/verify_deb.py \
            --runtime "$RT_DEB" \
            --dev     "$DEV_DEB" \
            --tag     "$TAG" \
            --codename "$CODENAME" \
            --arch    "$ARCH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.tag }}-${{ matrix.codename }}-${{ matrix.arch }}
          path: |
            libfabric_*.deb
            libfabric-dev_*.deb
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [find-tags, build]
    if: needs.find-tags.outputs.tags != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        tag: ${{ fromJson(needs.find-tags.outputs.tags) }}
    steps:
      - name: Download .debs for ${{ matrix.tag }}
        uses: actions/download-artifact@v4
        with:
          pattern: deb-${{ matrix.tag }}-*
          merge-multiple: true
          path: debs

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail
          ls -la debs/

          notes="Automated backport build of [libfabric ${TAG}](https://github.com/ofiwg/libfabric/releases/tag/${TAG}).

          Targets: Ubuntu 22.04 (jammy) and 24.04 (noble), amd64 and arm64.

          Install:
          \`\`\`
          curl -sSLO https://github.com/${REPO}/releases/download/${TAG}/libfabric_<version>_<arch>.deb
          sudo dpkg -i libfabric_*.deb
          \`\`\`"

          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" -R "$REPO" --clobber debs/*.deb
          else
            gh release create "$TAG" -R "$REPO" \
              --title "libfabric ${TAG}" \
              --notes "$notes" \
              debs/*.deb
          fi
